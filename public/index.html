<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usuarios</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --white: #ffffff;
      --border: #ddddd8;
      --text: #1a1a1a;
      --muted: #888884;
      --danger: #c0392b;
      --warning: #d4860a;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px;
    }

    .wrap { max-width: 680px; margin: 0 auto; }

    header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }

    .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .section { margin-bottom: 32px; }

    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .row { display: flex; gap: 8px; flex-wrap: wrap; }

    input {
      flex: 1;
      min-width: 120px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--text); }
    input::placeholder { color: var(--muted); }
    input[type="number"] { max-width: 90px; flex: none; }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .btn:hover  { opacity: 0.75; }
    .btn:active { opacity: 0.5; }

    .btn-dark   { background: var(--text);    color: #fff; }
    .btn-warn   { background: var(--warning); color: #fff; }
    .btn-danger { background: var(--danger);  color: #fff; }
    .btn-ghost  { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); opacity: 1; }
    .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 4px; }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafaf6; }

    .id-col { color: var(--muted); font-size: 12px; }
    .act { display: flex; gap: 6px; }

    .empty {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    .stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .stat { flex: 1; background: var(--white); padding: 14px 18px; }

    .stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 500;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--text);
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 10px 16px;
      border-radius: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 99;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.err  { background: var(--danger); }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Usuarios</h1>
    <p class="sub">crud · postgresql · express</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-val" id="statTotal">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Último ID</div>
      <div class="stat-val" id="statId">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">API</div>
      <div class="stat-val" id="statApi" style="font-size:13px;padding-top:4px">—</div>
    </div>
  </div>

  <!-- Crear -->
  <div class="section">
    <div class="section-label">Crear</div>
    <div class="row">
      <input type="text" id="crearNombre" placeholder="nombre del usuario"/>
      <button class="btn btn-dark" onclick="crearUsuario()">+ crear</button>
    </div>
  </div>

  <hr/>

  <!-- Lista -->
  <div class="section">
    <div class="table-head">
      <div class="section-label" style="margin:0">Lista</div>
      <button class="btn btn-ghost btn-xs" onclick="leerUsuarios()">↻ actualizar</button>
    </div>
    <table>
      <thead>
        <tr><th>ID</th><th>Nombre</th><th>Acciones</th></tr>
      </thead>
      <tbody id="tabla">
        <tr><td colspan="3"><div class="empty">sin usuarios</div></td></tr>
      </tbody>
    </table>
  </div>

  <hr/>

  <!-- Actualizar -->
  <div class="section">
    <div class="section-label">Actualizar</div>
    <div class="row">
      <input type="number" id="updId" placeholder="ID"/>
      <input type="text" id="updNombre" placeholder="nuevo nombre"/>
      <button class="btn btn-warn" onclick="actualizarUsuario()">actualizar</button>
    </div>
  </div>

  <hr/>

  <!-- Eliminar -->
  <div class="section">
    <div class="section-label">Eliminar</div>
    <div class="row">
      <input type="number" id="delId" placeholder="ID"/>
      <button class="btn btn-danger" onclick="eliminarUsuario()">eliminar</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  function toast(msg, err = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (err ? ' err' : '');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = '', 2800);
  }

  async function leerUsuarios() {
    try {
      const data = await fetch('/usuarios').then(r => r.json());
      document.getElementById('statTotal').textContent = data.length;
      document.getElementById('statApi').textContent = 'online';
      document.getElementById('statId').textContent = data.length ? Math.max(...data.map(u => u.id)) : '—';

      const tbody = document.getElementById('tabla');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="3"><div class="empty">sin usuarios</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(u => `
        <tr>
          <td class="id-col">${u.id}</td>
          <td>${u.nombre}</td>
          <td><div class="act">
            <button class="btn btn-warn btn-xs" onclick="fill(${u.id},'${u.nombre.replace(/'/g,"\\'")}')">editar</button>
            <button class="btn btn-danger btn-xs" onclick="fillDel(${u.id})">borrar</button>
          </div></td>
        </tr>`).join('');
    } catch {
      document.getElementById('statApi').textContent = 'error';
      toast('No se pudo conectar con la API', true);
    }
  }

  async function crearUsuario() {
    const nombre = document.getElementById('crearNombre').value.trim();
    if (!nombre) return toast('Escribe un nombre', true);
    const res = await fetch('/usuarios', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre })
    });
    if (!res.ok) return toast('Error al crear', true);
    document.getElementById('crearNombre').value = '';
    toast(`"${nombre}" creado`);
    leerUsuarios();
  }

  async function actualizarUsuario() {
    const id = document.getElementById('updId').value.trim();
    const nombre = document.getElementById('updNombre').value.trim();
    if (!id || !nombre) return toast('Completa ID y nombre', true);
    const res = await fetch(`/usuarios/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre })
    });
    if (!res.ok) return toast('Error al actualizar', true);
    document.getElementById('updId').value = '';
    document.getElementById('updNombre').value = '';
    toast(`#${id} actualizado`);
    leerUsuarios();
  }

  async function eliminarUsuario() {
    const id = document.getElementById('delId').value.trim();
    if (!id) return toast('Escribe un ID', true);
    const res = await fetch(`/usuarios/${id}`, { method: 'DELETE' });
    if (!res.ok) return toast('Error al eliminar', true);
    document.getElementById('delId').value = '';
    toast(`#${id} eliminado`);
    leerUsuarios();
  }

  function fill(id, nombre) {
    document.getElementById('updId').value = id;
    document.getElementById('updNombre').value = nombre;
    document.getElementById('updNombre').focus();
  }

  function fillDel(id) {
    document.getElementById('delId').value = id;
    document.getElementById('delId').focus();
  }

  leerUsuarios();
</script>
</body>
</html>
